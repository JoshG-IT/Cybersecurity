<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes rotate {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.8; }
          50% { opacity: 1; transform: scale(1.05); }
        }

        .container {
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          height: 200px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0d1117;
          border-radius: 12px;
          overflow: hidden;
          position: relative;
        }

        .gradient-bg {
          position: absolute;
          width: 300px;
          height: 300px;
          background: linear-gradient(45deg, #00d2ff, #3a7bd5, #ff00c1);
          filter: blur(60px);
          animation: rotate 10s linear infinite;
          opacity: 0.5;
        }

        .glass-card {
          position: relative;
          z-index: 1;
          background: rgba(255, 255, 255, 0.05);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.1);
          padding: 20px 60px;
          border-radius: 16px;
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
          animation: pulse 4s ease-in-out infinite;
        }

        h1 {
          margin: 0;
          color: white;
          font-size: 42px;
          font-weight: 800;
          letter-spacing: -1px;
          text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .accent {
          background: linear-gradient(90deg, #00d2ff, #ff00c1);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
      </style>

      <div class="container">
        <div class="gradient-bg"></div>
        <div class="glass-card">
          <h1>BUILDING <span class="accent">BEYOND</span></h1>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
